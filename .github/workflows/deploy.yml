name: Express CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        # registry: ccc-testcicd.example.com
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/express-app:latest
        provenance: false   # 👈 💥 必须加在这里！！！(属于 Build and push 步骤)
    
    - name: Verify image on Docker Hub
      run: |
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/express-app:latest
        echo "Image pulled successfully"
        
    - name: Deploy to production
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        # 使用密钥登录
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/express-app
          docker-compose pull
          docker-compose up -d
